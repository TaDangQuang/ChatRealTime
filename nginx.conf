events {
    worker_connections 1024;
}

http {
    # Danh sách các Chat Server
    upstream chat_servers {
        # ip_hash = sticky session: cùng IP luôn vào cùng 1 server
        # Quan trọng vì WebSocket cần persistent connection
        ip_hash;

        # ── FAILOVER: max_fails + fail_timeout ─────────────────────────────
        # max_fails=3   : sau 3 lần request thất bại liên tiếp tới 1 server,
        #                 Nginx coi server đó là "down" và tạm ngừng gửi traffic tới nó.
        # fail_timeout=10s : trong 10s tới, Nginx sẽ KHÔNG thử gửi request mới
        #                 tới server đó nữa (tránh client bị treo chờ timeout).
        #                 Sau 10s, Nginx sẽ thử lại 1 request để xem server đã sống chưa.
        server server1:3000 max_fails=3 fail_timeout=10s;
        server server2:3000 max_fails=3 fail_timeout=10s;
        server server3:3000 max_fails=3 fail_timeout=10s;

        # backup server: CHỈ nhận traffic khi TẤT CẢ server trên đều down.
        # Bỏ comment dòng dưới nếu bạn có 1 server dự phòng riêng (vd: server4).
        # server server4:3000 backup;
    }

    server {
        listen 80;

        # Serve static client files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Proxy API và WebSocket đến Chat Servers
        location /socket.io/ {
            proxy_pass         http://chat_servers;

            # ── Bật WebSocket upgrade ──────────────────────────
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # ── Forward IP thật của client ─────────────────────
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # ── Timeout cho long-lived connections ─────────────
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;

            # ── FAILOVER: connect timeout ngắn ──────────────────
            # Nếu 1 server không phản hồi kết nối trong 5s (vd: đã sập),
            # Nginx báo lỗi NGAY để proxy_next_upstream có thể xử lý,
            # thay vì để client chờ rất lâu.
            proxy_connect_timeout 5s;

            # ── FAILOVER: tự động retry sang server khác ────────
            # Khi server hiện tại lỗi kết nối/timeout/trả 502/503/504,
            # Nginx tự động thử lại request đó trên 1 server KHÁC trong upstream
            # (không trả lỗi thẳng cho client). Đây là cơ chế failover thật.
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;
        }

        location /api/ {
            proxy_pass       http://chat_servers;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;

            proxy_connect_timeout 5s;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        location /health {
            proxy_pass       http://chat_servers;
        }
    }
}