events {
    worker_connections 1024;
}

http {
    # Danh sách các Chat Server
    upstream chat_servers {
        # ip_hash = sticky session: cùng IP luôn vào cùng 1 server
        # Quan trọng vì WebSocket cần persistent connection
        ip_hash;

        server server1:3000;
        server server2:3000;
        server server3:3000;
    }

    server {
        listen 80;

        # Serve static client files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }

        # Proxy API và WebSocket đến Chat Servers
        location /socket.io/ {
            proxy_pass         http://chat_servers;

            # ── Bật WebSocket upgrade ──────────────────────────
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # ── Forward IP thật của client ─────────────────────
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # ── Timeout cho long-lived connections ─────────────
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        location /api/ {
            proxy_pass       http://chat_servers;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
        }

        location /health {
            proxy_pass       http://chat_servers;
        }
    }
}
